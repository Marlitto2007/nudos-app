name: keep-nudos-warm
# Keeps the free Render server awake so logins are fast and the in-process
# scheduler keeps firing reminders. Each run pings every ~3 min for ~50 min, so
# even when GitHub delays the next scheduled start, the server stays warm.
# Lives in the PUBLIC repo on purpose: public repos get unlimited, more-reliable
# Actions minutes (the private repo's schedule was throttled to ~once/2h).
on:
  schedule:
    - cron: "*/10 * * * *"   # attempt a start every 10 min (GitHub may delay; the loop covers gaps)
  workflow_dispatch: {}        # lets us start it on demand
concurrency:
  group: keepalive
  cancel-in-progress: false    # back-to-back coverage, never two at once
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Ping every ~3 minutes for ~50 minutes
        run: |
          for i in $(seq 1 17); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://nudos.onrender.com/ || echo "down")
            echo "ping $i -> $code"
            sleep 175
          done
